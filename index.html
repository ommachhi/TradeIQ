              <div className="flex items-center justify-between">
                <div>
                  <div className="font-medium">Email Notifications</div>
                  <div className="text-sm text-app-textMuted">Receive AI signals via email</div>
                </div>
                <label className="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" className="sr-only peer" checked={notifs} onChange={e=>setNotifs(e.target.checked)} />
                  <div className="w-11 h-6 bg-app-border peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-app-primary"></div>
                </label>
              </div>

              <div className="flex items-center justify-between opacity-60" title="Dark mode is always enabled">
                <div>
                  <div className="font-medium">Dark Mode</div>
                  <div className="text-sm text-app-textMuted">Default eye-care theme</div>
                </div>
                <label className="relative inline-flex items-center cursor-not-allowed">
                  <input type="checkbox" className="sr-only peer" checked={true} disabled />
                  <div className="w-11 h-6 bg-app-primary rounded-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:translate-x-full after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5"></div>
                </label>
              </div>

              <div>
                <label className="block text-sm font-medium text-app-textMuted mb-2">Default Market View</label>
                <select value={mktView} onChange={e=>setMktView(e.target.value)} className="w-full bg-[#0d1117] border border-app-border rounded-lg px-4 py-2.5 text-app-textPrimary focus:outline-none focus:border-app-primary appearance-none">
                  <option>NSE</option>
                  <option>BSE</option>
                  <option>Global</option>
                </select>
              </div>

              <div className="pt-2 border-t border-app-border">
                <button type="submit" className="bg-app-primary hover:bg-app-primary/90 text-white font-bold py-2.5 px-6 rounded-lg transition-all mt-4">Save Preferences</button>
              </div>
            </form>
          </div>
        </div>
      );
    };

    // --- SHELL ---
    const NAV_ITEMS = [
      { id: "Dashboard", icon: "layout-dashboard", desc: "Live portfolio intelligence, price action, and the latest model-driven signals." },
      { id: "Market", icon: "list", desc: "Global and Indian market overview." },
      { id: "Prediction", icon: "cpu", desc: "AI-driven buy/sell signals and target predictions." },
      { id: "Analytics", icon: "pie-chart", desc: "Deep performance analytics and trade insights." },
      { id: "Portfolio", icon: "briefcase", desc: "Your active positions and holdings." },
      { id: "Watchlist", icon: "eye", desc: "Monitor your favourite stocks." },
      { id: "Alerts", icon: "bell", desc: "Set price alerts and signal notifications." },
      { id: "Settings", icon: "settings", desc: "Manage your account and preferences." }
    ];

    const AppShell = ({ user, activeTab, setActiveTab, onLogout }) => {
      const currentNav = NAV_ITEMS.find(n => n.id === activeTab);

      const renderContent = () => {
        switch(activeTab) {
          case "Dashboard": return <DashboardView />;
          case "Market": return <MarketView />;
          case "Prediction": return <PredictionView />;
          case "Analytics": return <AnalyticsView />;
          case "Portfolio": return <PortfolioView />;
          case "Watchlist": return <WatchlistView />;
          case "Alerts": return <AlertsView />;
          case "Settings": return <SettingsView user={user} />;
          default: return <DashboardView />;
        }
      };

      return (
        <div className="flex h-screen bg-app-bg text-app-textPrimary overflow-hidden">
          {/* Sidebar */}
          <div className="w-[280px] bg-[#090c10] border-r border-app-border flex flex-col shrink-0">
            <div className="p-6">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 rounded bg-gradient-to-br from-app-primary to-app-secondary flex items-center justify-center font-black text-sm shadow-lg shadow-app-primary/20">TQ</div>
                <div className="font-black text-xl tracking-wider">TREDALQ</div>
              </div>
              <div className="text-xs text-app-textMuted font-medium uppercase tracking-wider">AI Trading Intelligence</div>
            </div>
            
            <div className="px-6 pb-4 border-b border-app-border/50">
              <div className="text-sm font-medium">Signed in as</div>
              <div className="text-app-primary font-bold truncate">{user.name} <span className="text-app-textMuted font-normal text-xs ml-1">({user.role})</span></div>
            </div>

            <div className="flex-1 overflow-y-auto py-4 px-3 space-y-1">
              {NAV_ITEMS.map(item => {
                const isActive = activeTab === item.id;
                return (
                  <button 
                    key={item.id} 
                    onClick={() => setActiveTab(item.id)}
                    className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all text-sm font-medium ${isActive ? 'bg-app-primary/10 text-app-primary' : 'text-app-textMuted hover:bg-white/5 hover:text-white'}`}
                  >
                    <Icon name={item.icon} size={18} />
                    {item.id}
                    {isActive && <span className="ml-auto w-2 h-2 rounded-full bg-app-primary"></span>}
                  </button>
                );
              })}
            </div>

            <div className="p-4 border-t border-app-border">
              <div className="flex items-center justify-between mb-4 px-2">
                <span className="text-xs text-app-textMuted font-medium">Auto-refresh live quotes</span>
                <label className="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" className="sr-only peer" defaultChecked />
                  <div className="w-7 h-4 bg-app-border rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-app-primary"></div>
                </label>
              </div>
              <button onClick={onLogout} className="w-full flex items-center justify-center gap-2 bg-white/5 hover:bg-app-danger/10 hover:text-app-danger text-app-textMuted py-2.5 rounded-lg transition-colors text-sm font-medium">
                <Icon name="log-out" size={16} /> Logout
              </button>
            </div>
          </div>

          {/* Main Content */}
          <div className="flex-1 flex flex-col h-screen overflow-hidden">
            <header className="h-[72px] border-b border-app-border flex items-center justify-between px-8 shrink-0 bg-app-bg/80 backdrop-blur-md z-10">
              <div className="pt-2">
                <h1 className="text-2xl font-black">{currentNav.id}</h1>
                <p className="text-sm text-app-textMuted">{currentNav.desc}</p>
              </div>
              <button className="bg-app-card hover:bg-[#1f2532] border border-app-border text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors">
                <Icon name="layout-dashboard" size={16}/> Deploy System
              </button>
            </header>
            
            <main className="flex-1 overflow-y-auto p-8">
              <div className="max-w-7xl mx-auto">
                {renderContent()}
              </div>
            </main>
          </div>
        </div>
      );
    };

    // --- APP CONTAINER ---
    const App = () => {
      const [users, setUsers] = useState(MOCK_USERS);
      const [currentUser, setCurrentUser] = useState(null);
      const [authView, setAuthView] = useState("login");
      const [activeTab, setActiveTab] = useState("Dashboard");

      const handleLogin = (email, password, setError) => {
        const u = users.find(x => x.email.toLowerCase() === email.toLowerCase());
        if (!u || u.password !== password) {
          setError("Invalid email or password.");
        } else {
          setError("");
          setCurrentUser(u);
          setActiveTab("Dashboard");
        }
      };

      const handleRegister = (name, email, password, confirm, setError) => {
        if (!name.trim() || !email.trim() || !password || !confirm) {
          return setError("Please fill in all fields.");
        }
        if (password !== confirm) {
          return setError("Passwords do not match.");
        }
        if (password.length < 8) {
          return setError("Password must be at least 8 characters long.");
        }
        if (users.find(x => x.email.toLowerCase() === email.toLowerCase())) {
          return setError("Email already registered.");
        }

        const newUser = { id: Date.now(), name, email, password, role: "User" };
        setUsers([...users, newUser]);
        setError("");
        setCurrentUser(newUser);
        setActiveTab("Dashboard");
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setAuthView("login");
      };

      if (currentUser) {
        return <AppShell user={currentUser} activeTab={activeTab} setActiveTab={setActiveTab} onLogout={handleLogout} />;
      }

      return authView === "login" ? 
        <LoginView setAuthView={setAuthView} onLogin={handleLogin} /> : 
        <RegisterView setAuthView={setAuthView} onRegister={handleRegister} />;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
